<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Surpresa</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; background: linear-gradient(135deg, #1a0010, #3d0030, #1a0010); display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; overflow: hidden; }
  .hearts-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .heart-float { position: absolute; animation: floatUp linear infinite; opacity: 0; }
  @keyframes floatUp { 0% { transform: translateY(100vh); opacity: 0.6; } 100% { transform: translateY(-10vh); opacity: 0; } }
  .page { display: none; flex-direction: column; align-items: center; z-index: 10; padding: 30px 20px; width: 100%; max-width: 380px; animation: fadeIn 0.8s ease; }
  .page.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .card { background: rgba(255,255,255,0.07); backdrop-filter: blur(16px); border: 1px solid rgba(255,150,180,0.25); border-radius: 24px; padding: 40px 30px; width: 100%; text-align: center; box-shadow: 0 8px 40px rgba(200,0,80,0.3); }
  .emoji-big { font-size: 3rem; margin-bottom: 16px; display: block; animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  h1 { color: #ffb3cc; font-size: 1.2rem; font-weight: normal; line-height: 1.6; margin-bottom: 28px; }
  input[type="password"] { width: 100%; padding: 14px; border-radius: 50px; border: 2px solid rgba(255,150,180,0.4); background: rgba(255,255,255,0.08); color: #fff; font-size: 1.6rem; text-align: center; letter-spacing: 8px; outline: none; margin-bottom: 20px; }
  input:focus { border-color: #ff6b9d; }
  button { background: linear-gradient(135deg, #e91e8c, #ff6b9d); color: white; border: none; padding: 14px; border-radius: 50px; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 20px rgba(233,30,140,0.4); width: 100%; }
  .hint { margin-top: 20px; background: rgba(255,100,150,0.15); border: 1px solid rgba(255,100,150,0.3); border-radius: 14px; padding: 14px; color: #ffb3cc; font-size: 0.95rem; }
  .success-emoji { font-size: 4rem; display: block; margin-bottom: 10px; animation: heartBeat 1.2s ease infinite; }
  @keyframes heartBeat { 0%,100%{transform:scale(1)}14%{transform:scale(1.3)}28%{transform:scale(1)}42%{transform:scale(1.2)} }
  .success-title { color: #ff6b9d; font-size: 1.6rem; margin-bottom: 16px; }
  .success-text { color: #ffcce0; font-size: 1rem; line-height: 1.8; margin-bottom: 24px; }
  .invite { background: rgba(233,30,140,0.15); border: 1px solid rgba(255,107,157,0.4); border-radius: 18px; padding: 20px; color: #fff; font-size: 1.05rem; line-height: 1.9; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .overlay.show { display: flex; }
  .popup { background: linear-gradient(135deg, #2d0020, #4a0035); border: 1px solid rgba(255,100,150,0.4); border-radius: 24px; padding: 36px 28px; max-width: 300px; width: 90%; text-align: center; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
  @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .popup-emoji { font-size: 2.5rem; display: block; margin-bottom: 10px; }
  .popup h2 { color: #ff6b9d; margin-bottom: 8px; }
  .popup p  { color: #ffb3cc; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }
</style>
</head>
<body>
<div class="hearts-bg" id="heartsBg"></div>

<div class="page active" id="page1">
  <div class="card">
    <span class="emoji-big">🔐</span>
    <h1>💕Feliz dia da Mulher!💕 digite a senha de 6 números.</h1>
    <input type="password" id="passwordInput" maxlength="6" inputmode="numeric" placeholder="● ● ● ● ● ●" />
    <button onclick="checkPassword()">Desbloquear 💕</button>
    <div class="hint" id="hintBox" style="display:none;"></div>
  </div>
</div>

<div class="page" id="page2">
  <div class="card">
    <span class="success-emoji">💖</span>
    <div class="success-title">Acertou! 🎉</div>
    <p class="success-text">Assim nenhum enxerido vai saber a surpresa!</p>
    <div class="invite">
      Amo você ❤️<br><br>
      Feliz dia da mulher!<br><br>
      Que você seja sempre foda! 💋✨<br><br>
      Vamos sair jantar hj a noite?
    </div>
  </div>
</div>

<div class="overlay" id="popup">
  <div class="popup">
    <span class="popup-emoji">😬</span>
    <h2>Senha errada!</h2>
    <p id="popupHint"></p>
    <button onclick="closePopup()">Tentar de novo 🔑</button>
  </div>
</div>

<script>
  const PASSWORD = "011222";
  let attempts = 0;
  const hints = ["💡 Dica 1: É uma data 📅","💡 Dica 2: A data é nossa 💑","💡 Dica 3: Está no seu celular 📱"];

  const bg = document.getElementById('heartsBg');
  ['💕','💗','💖','❤️','🌹','💓'].forEach(e => {
    for (let j = 0; j < 3; j++) {
      const h = document.createElement('div');
      h.className = 'heart-float';
      h.textContent = e;
      h.style.left = Math.random() * 100 + '%';
      h.style.animationDuration = (6 + Math.random() * 8) + 's';
      h.style.animationDelay = (Math.random() * 10) + 's';
      h.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
      bg.appendChild(h);
    }
  });

  function checkPassword() {
    const val = document.getElementById('passwordInput').value.trim();
    if (val === PASSWORD) {
      document.getElementById('page1').classList.remove('active');
      document.getElementById('page2').classList.add('active');
    } else {
      const idx = Math.min(attempts, hints.length - 1);
      document.getElementById('popupHint').textContent = hints[idx];
      document.getElementById('popup').classList.add('show');
      const hintBox = document.getElementById('hintBox');
      hintBox.style.display = 'block';
      hintBox.textContent = hints[idx];
      attempts++;
      document.getElementById('passwordInput').value = '';
    }
  }

  function closePopup() {
    document.getElementById('popup').classList.remove('show');
  }

  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });
</script>
</body>

</html>
